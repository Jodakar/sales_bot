<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TimoFeyA — Редактирование заказа</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .form-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .cart-item {
            background: #f9f9f9;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-remove {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-left: 10px;
        }
        .cart-item-quantity {
            width: 60px;
            padding: 5px;
            margin-left: 10px;
        }
        .add-product {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .add-product .search-select {
            flex: 2;
            min-width: 200px;
        }
        .add-product input[type="number"] {
            width: 80px;
        }
        .total {
            text-align: right;
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0;
            padding-top: 10px;
            border-top: 2px solid #ddd;
        }
        .submit-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        .submit-btn:hover {
            background: #219a52;
        }
        .back-btn {
            background: #95a5a6;
            margin-bottom: 20px;
        }
        .search-select {
            position: relative;
        }
        .search-select input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .search-select .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        .search-select .dropdown div {
            padding: 8px;
            cursor: pointer;
        }
        .search-select .dropdown div:hover {
            background: #f0f0f0;
        }
        .search-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        .search-btn:hover {
            background: #2980b9;
        }
        .nav-links a.active {
            background: #667eea;
            color: white;
        }
        .customer-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="/static/favicon.ico" alt="TimoFeyA">
                <h1>TimoFeyA</h1>
            </div>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div class="nav-links">
            <a href="/">📊 Главная</a>
            <a href="/products">🛍️ Товары</a>
            <a href="/orders" class="active">📦 Заказы</a>
            <a href="/customers">👥 Клиенты</a>
            <a href="/employees">👤 Сотрудники</a>
        </div>
        
        <button class="back-btn" onclick="window.location.href='/orders'">← Назад к заказам</button>
        
        <div class="card form-container">
            <h2>✏️ Редактирование заказа #<span id="order_id"></span></h2>
            
            <div class="customer-info" id="customer-info">
                <p>Загрузка данных клиента...</p>
            </div>
            
            <h3>📦 Товары в заказе</h3>
            <div id="cart"></div>
            
            <div class="add-product">
                <div class="search-select" style="flex: 2;">
                    <input type="text" id="product_search" placeholder="Поиск товара по названию, артикулу, производителю..." autocomplete="off">
                    <div id="product_dropdown" class="dropdown"></div>
                </div>
                <input type="number" id="quantity" placeholder="Кол-во" value="1" min="1" style="width: 80px;">
                <button class="search-btn" onclick="searchProducts()">🔍 Найти</button>
                <button onclick="addToCart()" style="background:#27ae60;">➕ Добавить</button>
            </div>
            
            <div class="total" id="total">Итого: 0 ₽</div>
            
            <div class="form-group">
                <label>Способ доставки</label>
                <select id="delivery_method">
                    <option value="Курьер">Курьер</option>
                    <option value="Самовывоз">Самовывоз</option>
                    <option value="Почта России">Почта России</option>
                    <option value="СДЭК">СДЭК</option>
                </select>
            </div>
            
            <button class="submit-btn" onclick="updateOrder()">💾 Сохранить изменения</button>
        </div>
    </div>

    <script>
        const order_id = window.location.pathname.split('/')[2];
        const token = localStorage.getItem('token');
        let products = [];
        let cart = [];
        
        if (!token) window.location.href = '/login';
        
        fetch(`/api/auth/check?token=${token}`)
            .then(res => res.json())
            .then(data => {
                if (!data.authenticated) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                } else {
                    document.getElementById('userName').textContent = data.user.name;
                }
            });
        
        async function loadProducts() {
            try {
                const response = await fetch('/api/products/');
                products = await response.json();
            } catch(e) {
                console.error('Ошибка загрузки товаров');
            }
        }
        
        async function loadOrder() {
            try {
                const response = await fetch(`/api/orders/${order_id}`);
                if (!response.ok) throw new Error('Заказ не найден');
                const order = await response.json();
                
                // Проверка статуса (только not_paid можно редактировать)
                if (order.status !== 'not_paid') {
                    alert('Редактирование доступно только для неоплаченных заказов');
                    window.location.href = `/orders/${order_id}`;
                    return;
                }
                
                document.getElementById('order_id').textContent = order.order_id;
                document.getElementById('delivery_method').value = order.delivery_method || 'Курьер';
                
                // Отображаем информацию о клиенте
                document.getElementById('customer-info').innerHTML = `
                    <h3>👤 Клиент: ${order.customer_name}</h3>
                    <div class="detail-grid">
                        <div><strong>Телефон:</strong> ${order.customer_phone || '—'}</div>
                        <div><strong>Email:</strong> ${order.customer_email || '—'}</div>
                        <div><strong>Адрес:</strong> ${order.customer_address || '—'}</div>
                    </div>
                `;
                
                // Загружаем товары в корзину
                cart = [];
                if (order.items && order.items.length > 0) {
                    for (let i = 0; i < order.items.length; i++) {
                        const item = order.items[i];
                        cart.push({
                            product_id: item.product_id,
                            product_name: item.product_name,
                            price: item.price,
                            quantity: item.quantity
                        });
                    }
                }
                renderCart();
            } catch(e) {
                document.getElementById('customer-info').innerHTML = '<p>❌ Ошибка загрузки заказа</p>';
            }
        }
        
        function searchProducts() {
            const query = document.getElementById('product_search').value.trim();
            if (query.length < 2) {
                alert('Введите минимум 2 символа для поиска');
                return;
            }
            
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(query.toLowerCase()) ||
                (p.article && p.article.toLowerCase().includes(query.toLowerCase())) ||
                (p.manufacturer && p.manufacturer.toLowerCase().includes(query.toLowerCase()))
            );
            
            const dropdown = document.getElementById('product_dropdown');
            if (filtered.length === 0) {
                dropdown.innerHTML = '<div style="padding:8px;">Ничего не найдено</div>';
                dropdown.style.display = 'block';
                setTimeout(() => dropdown.style.display = 'none', 2000);
                return;
            }
            
            dropdown.innerHTML = '';
            filtered.slice(0, 10).forEach(p => {
                const div = document.createElement('div');
                div.textContent = `${p.name} — ${p.price.toLocaleString()} ₽ (ост: ${p.stock})`;
                div.onclick = () => {
                    document.getElementById('product_search').value = p.name;
                    document.getElementById('product_search').dataset.productId = p.product_id;
                    dropdown.style.display = 'none';
                };
                dropdown.appendChild(div);
            });
            dropdown.style.display = 'block';
        }
        
        function addToCart() {
            const productId = document.getElementById('product_search').dataset.productId;
            const quantity = parseInt(document.getElementById('quantity').value);
            
            if (!productId) {
                alert('Выберите товар из списка');
                return;
            }
            if (quantity < 1) {
                alert('Количество должно быть больше 0');
                return;
            }
            
            const product = products.find(p => p.product_id == productId);
            if (!product) return;
            
            if (product.stock < quantity) {
                alert(`Недостаточно товара. Доступно: ${product.stock} шт.`);
                return;
            }
            
            const existingItem = cart.find(item => item.product_id == productId);
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                cart.push({
                    product_id: product.product_id,
                    product_name: product.name,
                    price: product.price,
                    quantity: quantity
                });
            }
            
            renderCart();
            document.getElementById('quantity').value = 1;
            document.getElementById('product_search').value = '';
            document.getElementById('product_search').dataset.productId = '';
            document.getElementById('product_dropdown').style.display = 'none';
        }
        
        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }
        
        function updateQuantity(index, newQuantity) {
            if (newQuantity < 1) {
                removeFromCart(index);
                return;
            }
            cart[index].quantity = newQuantity;
            renderCart();
        }
        
        function renderCart() {
            const cartDiv = document.getElementById('cart');
            if (cart.length === 0) {
                cartDiv.innerHTML = '<p>Корзина пуста</p>';
                document.getElementById('total').innerHTML = 'Итого: 0 ₽';
                return;
            }
            
            let html = '';
            let total = 0;
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                html += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <strong>${item.product_name}</strong><br>
                            ${item.price.toLocaleString()} ₽ × 
                            <input type="number" class="cart-item-quantity" value="${item.quantity}" min="1" 
                                   onchange="updateQuantity(${index}, parseInt(this.value))">
                            = ${itemTotal.toLocaleString()} ₽
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart(${index})">🗑️</button>
                    </div>
                `;
            });
            cartDiv.innerHTML = html;
            document.getElementById('total').innerHTML = `Итого: ${total.toLocaleString()} ₽`;
        }
        
        async function updateOrder() {
            if (cart.length === 0) {
                alert('Добавьте товары в заказ');
                return;
            }
            
            const orderData = {
                delivery_method: document.getElementById('delivery_method').value,
                items: cart.map(item => ({
                    product_id: item.product_id,
                    quantity: item.quantity
                }))
            };
            
            try {
                const response = await fetch(`/api/orders/${order_id}/update`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    alert(`✅ Заказ #${order_id} обновлён! Новая сумма: ${result.total_amount.toLocaleString()} ₽`);
                    window.location.href = `/orders/${order_id}`;
                } else {
                    const error = await response.json();
                    alert(`❌ Ошибка: ${error.detail || 'Неизвестная ошибка'}`);
                }
            } catch(e) {
                alert('❌ Ошибка подключения к серверу');
            }
        }
        
        async function logout() {
            const token = localStorage.getItem('token');
            if (token) await fetch(`/api/auth/logout?token=${token}`, { method: 'POST' });
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        loadProducts();
        loadOrder();
    </script>
</body>
</html>
