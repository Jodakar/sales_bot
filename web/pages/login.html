<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TimoFeyA — Вход</title>
    <link rel="icon" href="/static/favicon.ico">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        .logo img {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #667eea;
            font-size: 28px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .checkbox-container {
            text-align: left;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-container input {
            width: auto;
            margin: 0;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #5a67d8;
        }
        .error {
            color: #e74c3c;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="/static/favicon.ico" alt="TimoFeyA">
        </div>
        <h1>TimoFeyA</h1>
        <p>Вход в систему</p>
        <input type="email" id="username" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <div class="checkbox-container">
            <input type="checkbox" id="remember">
            <label for="remember">Запомнить меня</label>
        </div>
        <button onclick="login()">Войти</button>
        <div id="error" class="error"></div>
    </div>

    <script>
        // Загрузка сохранённых данных
        const savedLogin = localStorage.getItem('saved_login');
        const savedPassword = localStorage.getItem('saved_password');
        
        if (savedLogin && savedPassword) {
            document.getElementById('username').value = savedLogin;
            document.getElementById('password').value = savedPassword;
            document.getElementById('remember').checked = true;
        }
        
        async function login() {
            let username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const errorDiv = document.getElementById('error');
            
            // Приводим email к нижнему регистру (убираем чувствительность к регистру)
            username = username.toLowerCase().trim();
            
            if (!username || !password) {
                errorDiv.textContent = 'Введите email и пароль';
                return;
            }
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    if (remember) {
                        localStorage.setItem('saved_login', username);
                        localStorage.setItem('saved_password', password);
                    } else {
                        localStorage.removeItem('saved_login');
                        localStorage.removeItem('saved_password');
                    }
                    
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = data.detail || 'Ошибка входа';
                }
            } catch (e) {
                errorDiv.textContent = 'Ошибка подключения к серверу';
            }
        }
        
        // Проверка, может уже залогинены
        const token = localStorage.getItem('token');
        if (token) {
            fetch(`/api/auth/check?token=${token}`)
                .then(res => res.json())
                .then(data => {
                    if (data.authenticated) {
                        window.location.href = '/';
                    }
                });
        }
        
        // Нажатие Enter
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
