<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TimoFey — Вход</title>
    <link rel="icon" href="/static/favicon.ico">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        .logo img {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #667eea;
            font-size: 28px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #5a67d8;
        }
        .error {
            color: #e74c3c;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="/static/favicon.ico" alt="TimoFey">
        </div>
        <h1>TimoFey</h1>
        <p>Вход в систему</p>
        <input type="text" id="username" placeholder="Имя пользователя" value="admin">
        <input type="password" id="password" placeholder="Пароль" value="admin123">
        <button onclick="login()">Войти</button>
        <div id="error" class="error"></div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = data.detail || 'Ошибка входа';
                }
            } catch (e) {
                errorDiv.textContent = 'Ошибка подключения к серверу';
            }
        }
        
        const token = localStorage.getItem('token');
        if (token) {
            fetch(`/api/auth/check?token=${token}`)
                .then(res => res.json())
                .then(data => {
                    if (data.authenticated) {
                        window.location.href = '/';
                    }
                });
        }
    </script>
</body>
</html>
