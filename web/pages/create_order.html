<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TimoFey — Новый заказ</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .form-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .cart-item {
            background: #f9f9f9;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-remove {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .add-product {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        .add-product select, .add-product input {
            flex: 1;
        }
        .total {
            text-align: right;
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0;
            padding-top: 10px;
            border-top: 2px solid #ddd;
        }
        .submit-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        .submit-btn:hover {
            background: #219a52;
        }
        .back-btn {
            background: #95a5a6;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="/static/favicon.ico" alt="TimoFey">
                <h1>TimoFey</h1>
            </div>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div class="nav-links">
            <a href="/">📊 Главная</a>
            <a href="/products">🛍️ Товары</a>
            <a href="/orders">📦 Заказы</a>
            <a href="/customers">👥 Клиенты</a>
        </div>
        
        <button class="back-btn" onclick="window.location.href='/orders'">← Назад к заказам</button>
        
        <div class="card form-container">
            <h2>🛒 Создание нового заказа</h2>
            
            <div class="form-group">
                <label>Клиент</label>
                <select id="customer_id" onchange="selectCustomer()">
                    <option value="">Выберите существующего клиента</option>
                </select>
                <div style="margin-top: 5px;">
                    <a href="#" onclick="showNewCustomerForm()">+ Новый клиент</a>
                </div>
            </div>
            
            <div id="new-customer-form" style="display:none;">
                <div class="form-group">
                    <label>ФИО *</label>
                    <input type="text" id="new_full_name">
                </div>
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="text" id="new_phone">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="new_email">
                </div>
                <div class="form-group">
                    <label>Адрес</label>
                    <input type="text" id="new_address">
                </div>
                <hr>
            </div>
            
            <h3>📦 Товары в заказе</h3>
            <div id="cart"></div>
            
            <div class="add-product">
                <select id="product_id">
                    <option value="">Выберите товар</option>
                </select>
                <input type="number" id="quantity" placeholder="Количество" value="1" min="1">
                <button onclick="addToCart()">➕ Добавить</button>
            </div>
            
            <div class="total" id="total">Итого: 0 ₽</div>
            
            <div class="form-group">
                <label>Способ доставки</label>
                <select id="delivery_method">
                    <option value="Курьер">Курьер</option>
                    <option value="Самовывоз">Самовывоз</option>
                    <option value="Почта России">Почта России</option>
                    <option value="СДЭК">СДЭК</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Комментарий к заказу</label>
                <textarea id="comment" rows="3"></textarea>
            </div>
            
            <button class="submit-btn" onclick="createOrder()">✅ Оформить заказ</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';
        
        let cart = [];
        let products = [];
        
        fetch(`/api/auth/check?token=${token}`)
            .then(res => res.json())
            .then(data => {
                if (!data.authenticated) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                } else {
                    document.getElementById('userName').textContent = data.user.name;
                }
            });
        
        async function loadProducts() {
            try {
                const response = await fetch('/api/products/');
                products = await response.json();
                const select = document.getElementById('product_id');
                products.forEach(p => {
                    if (p.stock > 0) {
                        const option = document.createElement('option');
                        option.value = p.product_id;
                        option.textContent = `${p.name} — ${p.price.toLocaleString()} ₽ (остаток: ${p.stock})`;
                        select.appendChild(option);
                    }
                });
            } catch(e) {
                console.error('Ошибка загрузки товаров');
            }
        }
        
        async function loadCustomers() {
            try {
                const response = await fetch('/api/customers/');
                const customers = await response.json();
                const select = document.getElementById('customer_id');
                customers.forEach(c => {
                    const option = document.createElement('option');
                    option.value = c.customer_id;
                    option.textContent = `${c.full_name} — ${c.phone || 'без телефона'}`;
                    select.appendChild(option);
                });
            } catch(e) {
                console.error('Ошибка загрузки клиентов');
            }
        }
        
        function selectCustomer() {
            document.getElementById('new-customer-form').style.display = 'none';
        }
        
        function showNewCustomerForm() {
            document.getElementById('customer_id').value = '';
            document.getElementById('new-customer-form').style.display = 'block';
        }
        
        function addToCart() {
            const productId = document.getElementById('product_id').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            
            if (!productId) {
                alert('Выберите товар');
                return;
            }
            if (quantity < 1) {
                alert('Количество должно быть больше 0');
                return;
            }
            
            const product = products.find(p => p.product_id == productId);
            if (!product) return;
            
            if (product.stock < quantity) {
                alert(`Недостаточно товара на складе. Доступно: ${product.stock} шт.`);
                return;
            }
            
            const existingItem = cart.find(item => item.product_id == productId);
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                cart.push({
                    product_id: product.product_id,
                    product_name: product.name,
                    price: product.price,
                    quantity: quantity
                });
            }
            
            renderCart();
            document.getElementById('quantity').value = 1;
        }
        
        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }
        
        function renderCart() {
            const cartDiv = document.getElementById('cart');
            if (cart.length === 0) {
                cartDiv.innerHTML = '<p>Корзина пуста</p>';
                document.getElementById('total').innerHTML = 'Итого: 0 ₽';
                return;
            }
            
            let html = '';
            let total = 0;
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                html += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <strong>${item.product_name}</strong><br>
                            ${item.price.toLocaleString()} ₽ × ${item.quantity} = ${itemTotal.toLocaleString()} ₽
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart(${index})">🗑️</button>
                    </div>
                `;
            });
            cartDiv.innerHTML = html;
            document.getElementById('total').innerHTML = `Итого: ${total.toLocaleString()} ₽`;
        }
        
        async function createOrder() {
            if (cart.length === 0) {
                alert('Добавьте товары в заказ');
                return;
            }
            
            let customerId = document.getElementById('customer_id').value;
            let customerName = '';
            let customerPhone = '';
            let customerAddress = '';
            
            if (customerId) {
                const response = await fetch(`/api/customers/${customerId}`);
                const customer = await response.json();
                customerName = customer.full_name;
                customerPhone = customer.phone || '';
                customerAddress = customer.address || '';
            } else {
                customerName = document.getElementById('new_full_name').value.trim();
                if (!customerName) {
                    alert('Введите ФИО клиента');
                    return;
                }
                customerPhone = document.getElementById('new_phone').value;
                customerAddress = document.getElementById('new_address').value;
            }
            
            const orderData = {
                customer_name: customerName,
                customer_phone: customerPhone,
                customer_address: customerAddress,
                comment: document.getElementById('comment').value,
                delivery_method: document.getElementById('delivery_method').value,
                items: cart.map(item => ({
                    product_id: item.product_id,
                    quantity: item.quantity
                }))
            };
            
            try {
                const response = await fetch('/api/orders/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    alert(`✅ Заказ #${result.order_id} создан! Сумма: ${result.total_amount.toLocaleString()} ₽`);
                    window.location.href = `/orders/${result.order_id}`;
                } else {
                    const error = await response.json();
                    alert(`❌ Ошибка: ${error.detail || 'Неизвестная ошибка'}`);
                }
            } catch(e) {
                alert('❌ Ошибка подключения к серверу');
            }
        }
        
        async function logout() {
            const token = localStorage.getItem('token');
            if (token) await fetch(`/api/auth/logout?token=${token}`, { method: 'POST' });
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        loadProducts();
        loadCustomers();
    </script>
</body>
</html>
