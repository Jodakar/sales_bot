<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TimoFeyA — Новый заказ</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .form-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .cart-item {
            background: #f9f9f9;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-remove {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .add-product {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .add-product .search-select {
            flex: 2;
            min-width: 200px;
        }
        .add-product input[type="number"] {
            width: 80px;
        }
        .total {
            text-align: right;
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0;
            padding-top: 10px;
            border-top: 2px solid #ddd;
        }
        .submit-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        .submit-btn:hover {
            background: #219a52;
        }
        .back-btn {
            background: #95a5a6;
            margin-bottom: 20px;
        }
        .phone-prefix {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .phone-prefix span {
            background: #f5f5f5;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .phone-prefix input {
            flex: 1;
        }
        .search-select {
            position: relative;
        }
        .search-select input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .search-select .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        .search-select .dropdown div {
            padding: 8px;
            cursor: pointer;
        }
        .search-select .dropdown div:hover {
            background: #f0f0f0;
        }
        .search-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        .search-btn:hover {
            background: #2980b9;
        }
        .address-autocomplete {
            position: relative;
        }
        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .suggestions-dropdown div {
            padding: 8px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .suggestions-dropdown div:hover {
            background: #f0f0f0;
        }
        .suggestions-dropdown div:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="/static/favicon.ico" alt="TimoFeyA">
                <h1>TimoFeyA</h1>
            </div>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div class="nav-links">
            <a href="/">📊 Главная</a>
            <a href="/products">🛍️ Товары</a>
            <a href="/orders" class="active">📦 Заказы</a>
            <a href="/customers">👥 Клиенты</a>
            <a href="/employees">👤 Сотрудники</a>
        </div>
        
        <button class="back-btn" onclick="window.location.href='/orders'">← Назад к заказам</button>
        
        <div class="card form-container">
            <h2>🛒 Создание нового заказа</h2>
            
            <div class="form-group">
                <label>Клиент</label>
                <div class="search-section" style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <div class="search-select" style="flex: 1;">
                        <input type="text" id="customer_search" placeholder="Введите имя, телефон или email для поиска клиента" autocomplete="off">
                        <div id="customer_dropdown" class="dropdown"></div>
                    </div>
                    <button class="search-btn" onclick="searchCustomers()">🔍 Найти</button>
                </div>
                <div style="margin-top: 5px;">
                    <a href="#" onclick="showNewCustomerForm()">+ Новый клиент</a>
                </div>
            </div>
            
            <div id="new-customer-form" style="display:none;">
                <div class="form-group">
                    <label>ФИО *</label>
                    <input type="text" id="new_full_name">
                </div>
                <div class="form-group">
                    <label>Телефон</label>
                    <div class="phone-prefix">
                        <span>+</span>
                        <input type="text" id="new_phone" placeholder="79250000000" maxlength="11">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="new_email">
                </div>
                <div class="form-group">
                    <label>Адрес</label>
                    <div class="address-autocomplete">
                        <input type="text" id="new_address" placeholder="Введите адрес (город, улица, дом)" autocomplete="off">
                        <div id="address_suggestions" class="suggestions-dropdown"></div>
                    </div>
                </div>
                <div class="form-group" id="apartment-group" style="display:none;">
                    <label>Квартира / офис</label>
                    <input type="text" id="new_apartment" placeholder="№ квартиры или офиса">
                </div>
                <hr>
            </div>
            
            <h3>📦 Товары в заказе</h3>
            <div id="cart"></div>
            
            <div class="add-product">
                <div class="search-select" style="flex: 2;">
                    <input type="text" id="product_search" placeholder="Поиск товара по названию, артикулу, производителю..." autocomplete="off">
                    <div id="product_dropdown" class="dropdown"></div>
                </div>
                <input type="number" id="quantity" placeholder="Кол-во" value="1" min="1" style="width: 80px;">
                <button class="search-btn" onclick="searchProducts()">🔍 Найти</button>
                <button onclick="addToCart()" style="background:#27ae60;">➕ Добавить</button>
            </div>
            
            <div class="total" id="total">Итого: 0 ₽</div>
            
            <div class="form-group">
                <label>Способ доставки</label>
                <select id="delivery_method">
                    <option value="Курьер">Курьер</option>
                    <option value="Самовывоз">Самовывоз</option>
                    <option value="Почта России">Почта России</option>
                    <option value="СДЭК">СДЭК</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Комментарий к заказу</label>
                <textarea id="comment" rows="3"></textarea>
            </div>
            
            <button class="submit-btn" onclick="createOrder()">✅ Оформить заказ</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        let currentUser = null;
        let cart = [];
        let products = [];
        let customers = [];
        let selectedCustomer = null;
        
        if (!token) window.location.href = '/login';
        
        fetch(`/api/auth/check?token=${token}`)
            .then(res => res.json())
            .then(data => {
                if (!data.authenticated) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                } else {
                    currentUser = data.user;
                    document.getElementById('userName').textContent = data.user.name;
                }
            });
        
        async function loadProducts() {
            try {
                const response = await fetch('/api/products/');
                products = await response.json();
            } catch(e) {
                console.error('Ошибка загрузки товаров');
            }
        }
        
        async function loadCustomers() {
            try {
                const response = await fetch('/api/customers/');
                customers = await response.json();
            } catch(e) {
                console.error('Ошибка загрузки клиентов');
            }
        }
        
        function searchProducts() {
            const query = document.getElementById('product_search').value.trim();
            if (query.length < 2) {
                alert('Введите минимум 2 символа для поиска');
                return;
            }
            
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(query.toLowerCase()) ||
                (p.article && p.article.toLowerCase().includes(query.toLowerCase())) ||
                (p.manufacturer && p.manufacturer.toLowerCase().includes(query.toLowerCase()))
            );
            
            const dropdown = document.getElementById('product_dropdown');
            if (filtered.length === 0) {
                dropdown.innerHTML = '<div style="padding:8px;">Ничего не найдено</div>';
                dropdown.style.display = 'block';
                setTimeout(() => dropdown.style.display = 'none', 2000);
                return;
            }
            
            dropdown.innerHTML = '';
            filtered.slice(0, 10).forEach(p => {
                const div = document.createElement('div');
                div.textContent = `${p.name} — ${p.price.toLocaleString()} ₽ (ост: ${p.stock})`;
                div.onclick = () => {
                    document.getElementById('product_search').value = p.name;
                    document.getElementById('product_search').dataset.productId = p.product_id;
                    dropdown.style.display = 'none';
                };
                dropdown.appendChild(div);
            });
            dropdown.style.display = 'block';
        }
        
        function searchCustomers() {
            const query = document.getElementById('customer_search').value.trim();
            if (query.length < 2) {
                alert('Введите минимум 2 символа для поиска');
                return;
            }
            
            const filtered = customers.filter(c => 
                c.full_name.toLowerCase().includes(query.toLowerCase()) ||
                (c.phone && c.phone.toLowerCase().includes(query.toLowerCase())) ||
                (c.email && c.email.toLowerCase().includes(query.toLowerCase()))
            );
            
            const dropdown = document.getElementById('customer_dropdown');
            if (filtered.length === 0) {
                dropdown.innerHTML = '<div style="padding:8px;">Ничего не найдено</div>';
                dropdown.style.display = 'block';
                setTimeout(() => dropdown.style.display = 'none', 2000);
                return;
            }
            
            dropdown.innerHTML = '';
            filtered.slice(0, 10).forEach(c => {
                const div = document.createElement('div');
                div.textContent = `${c.full_name} — ${c.phone || 'без телефона'}`;
                div.onclick = () => {
                    selectCustomer(c);
                    dropdown.style.display = 'none';
                };
                dropdown.appendChild(div);
            });
            dropdown.style.display = 'block';
        }
        
        function selectCustomer(customer) {
            selectedCustomer = customer;
            document.getElementById('customer_search').value = customer.full_name;
            document.getElementById('new-customer-form').style.display = 'none';
        }
        
        function showNewCustomerForm() {
            selectedCustomer = null;
            document.getElementById('customer_search').value = '';
            document.getElementById('new-customer-form').style.display = 'block';
        }
        
        // Автозаполнение адреса
        let addressTimeout;
        
        async function searchAddress(query) {
            if (query.length < 3) {
                document.getElementById('address_suggestions').style.display = 'none';
                return;
            }
            
            try {
                const response = await fetch('/api/geocoder/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                
                if (!response.ok) return;
                
                const suggestions = await response.json();
                const suggestionsDiv = document.getElementById('address_suggestions');
                
                if (suggestions.length === 0) {
                    suggestionsDiv.style.display = 'none';
                    return;
                }
                
                suggestionsDiv.innerHTML = '';
                suggestions.forEach(s => {
                    const div = document.createElement('div');
                    div.textContent = s.full_address;
                    div.onclick = () => {
                        document.getElementById('new_address').value = s.full_address;
                        suggestionsDiv.style.display = 'none';
                        document.getElementById('apartment-group').style.display = 'block';
                    };
                    suggestionsDiv.appendChild(div);
                });
                suggestionsDiv.style.display = 'block';
            } catch(e) {
                console.error('Ошибка поиска адреса:', e);
            }
        }
        
        const addressInput = document.getElementById('new_address');
        if (addressInput) {
            addressInput.addEventListener('input', function(e) {
                clearTimeout(addressTimeout);
                const query = e.target.value;
                addressTimeout = setTimeout(() => searchAddress(query), 300);
            });
        }
        
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.address-autocomplete')) {
                document.getElementById('address_suggestions').style.display = 'none';
            }
        });
        
        function addToCart() {
            const productId = document.getElementById('product_search').dataset.productId;
            const quantity = parseInt(document.getElementById('quantity').value);
            
            if (!productId) {
                alert('Выберите товар из списка');
                return;
            }
            if (quantity < 1) {
                alert('Количество должно быть больше 0');
                return;
            }
            
            const product = products.find(p => p.product_id == productId);
            if (!product) return;
            
            if (product.stock < quantity) {
                alert(`Недостаточно товара на складе. Доступно: ${product.stock} шт.`);
                return;
            }
            
            const existingItem = cart.find(item => item.product_id == productId);
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                cart.push({
                    product_id: product.product_id,
                    product_name: product.name,
                    price: product.price,
                    quantity: quantity
                });
            }
            
            renderCart();
            document.getElementById('quantity').value = 1;
            document.getElementById('product_search').value = '';
            document.getElementById('product_search').dataset.productId = '';
            document.getElementById('product_dropdown').style.display = 'none';
        }
        
        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }
        
        function renderCart() {
            const cartDiv = document.getElementById('cart');
            if (cart.length === 0) {
                cartDiv.innerHTML = '<p>Корзина пуста</p>';
                document.getElementById('total').innerHTML = 'Итого: 0 ₽';
                return;
            }
            
            let html = '';
            let total = 0;
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                html += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <strong>${item.product_name}</strong><br>
                            ${item.price.toLocaleString()} ₽ × ${item.quantity} = ${itemTotal.toLocaleString()} ₽
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart(${index})">🗑️</button>
                    </div>
                `;
            });
            cartDiv.innerHTML = html;
            document.getElementById('total').innerHTML = `Итого: ${total.toLocaleString()} ₽`;
        }
        
        async function createOrder() {
            if (cart.length === 0) {
                alert('Добавьте товары в заказ');
                return;
            }
            
            let customerName = '';
            let customerPhone = '';
            let customerAddress = '';
            let customerEmail = '';
            
            if (selectedCustomer) {
                customerName = selectedCustomer.full_name;
                customerPhone = selectedCustomer.phone || '';
                customerAddress = selectedCustomer.address || '';
                customerEmail = selectedCustomer.email || '';
            } else {
                customerName = document.getElementById('new_full_name').value.trim();
                if (!customerName) {
                    alert('Введите ФИО клиента');
                    return;
                }
                const phoneInput = document.getElementById('new_phone').value.trim();
                customerPhone = phoneInput ? '+' + phoneInput : '';
                
                let address = document.getElementById('new_address').value.trim();
                const apartment = document.getElementById('new_apartment').value.trim();
                if (apartment) {
                    address += `, кв. ${apartment}`;
                }
                customerAddress = address;
                customerEmail = document.getElementById('new_email').value;
            }
            
            const orderData = {
                customer_name: customerName,
                customer_phone: customerPhone,
                customer_address: customerAddress,
                customer_email: customerEmail,
                comment: document.getElementById('comment').value,
                delivery_method: document.getElementById('delivery_method').value,
                items: cart.map(item => ({
                    product_id: item.product_id,
                    quantity: item.quantity
                }))
            };
            
            try {
                const response = await fetch('/api/orders/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    alert(`✅ Заказ #${result.order_id} создан! Сумма: ${result.total_amount.toLocaleString()} ₽`);
                    window.location.href = `/orders/${result.order_id}`;
                } else {
                    const error = await response.json();
                    alert(`❌ Ошибка: ${error.detail || 'Неизвестная ошибка'}`);
                }
            } catch(e) {
                alert('❌ Ошибка подключения к серверу');
            }
        }
        
        async function logout() {
            const token = localStorage.getItem('token');
            if (token) await fetch(`/api/auth/logout?token=${token}`, { method: 'POST' });
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        loadProducts();
        loadCustomers();
    </script>
</body>
</html>
