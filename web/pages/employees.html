<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TimoFey — Сотрудники</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .add-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .add-btn:hover {
            background: #219a52;
        }
        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-section input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .search-section button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .search-section button:hover {
            background: #2980b9;
        }
        .view-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 5px;
        }
        .view-btn:hover {
            background: #2980b9;
        }
        .edit-btn {
            background: #f39c12;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 5px;
        }
        .edit-btn:hover {
            background: #e67e22;
        }
        .edit-btn.disabled {
            background: #95a5a6;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .role-dev {
            background: #9b59b6;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            font-size: 12px;
        }
        .role-admin {
            background: #e74c3c;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            font-size: 12px;
        }
        .role-manager {
            background: #3498db;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            font-size: 12px;
        }
        .active-badge {
            background: #27ae60;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            font-size: 12px;
        }
        .inactive-badge {
            background: #95a5a6;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            font-size: 12px;
        }
        .employees-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .employees-table th {
            background: #f5f5f5;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #ddd;
            font-weight: 600;
        }
        .employees-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .employees-table tr:hover {
            background: #f9f9f9;
        }
        .employees-table tr:nth-child(even) {
            background: #ffffff;
        }
        .employees-table tr:nth-child(odd) {
            background: #f9f9f9;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 20px;
            width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 10px;
            position: relative;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .modal-content label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        .modal-content .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        .modal-content .checkbox input {
            width: auto;
        }
        .close {
            position: absolute;
            top: 10px;
            right: 20px;
            cursor: pointer;
            font-size: 24px;
        }
        .error {
            color: #e74c3c;
            margin-top: 10px;
        }
        .phone-prefix {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .phone-prefix span {
            background: #f5f5f5;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .phone-prefix input {
            flex: 1;
            maxlength="11";
        }
        .table-container {
            overflow-x: auto;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .nav-links a.active {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="/static/favicon.ico" alt="TimoFey">
                <h1>TimoFey</h1>
            </div>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div class="nav-links">
            <a href="/">📊 Главная</a>
            <a href="/products">🛍️ Товары</a>
            <a href="/orders">📦 Заказы</a>
            <a href="/customers">👥 Клиенты</a>
            <a href="/employees" class="active">👤 Сотрудники</a>
        </div>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Поиск по имени, email, телефону...">
            <button onclick="searchEmployees()">🔍 Найти</button>
            <button onclick="resetSearch()">✖️ Сброс</button>
        </div>
        
        <button class="add-btn" onclick="showAddModal()">➕ Добавить сотрудника</button>
        
        <div class="card">
            <h2>👥 Список сотрудников</h2>
            <div class="table-container">
                <div id="employees-table">
                    <p>Загрузка...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAddModal()">&times;</span>
            <h3>Добавить сотрудника</h3>
            <label>ФИО *</label>
            <input type="text" id="add_full_name">
            <label>Email *</label>
            <input type="email" id="add_email">
            <label>Телефон</label>
            <div class="phone-prefix">
                <span>+</span>
                <input type="text" id="add_phone" placeholder="79250000000" maxlength="11">
            </div>
            <label>Дата рождения</label>
            <input type="date" id="add_birth_date">
            <label>Логин *</label>
            <input type="text" id="add_login">
            <label>Пароль *</label>
            <input type="password" id="add_password">
            <label>Роль</label>
            <select id="add_role" onchange="toggleRightsByRole('add')">
                <option value="manager">Менеджер</option>
                <option value="admin">Администратор</option>
                <option value="dev">Разработчик</option>
            </select>
            <div class="checkbox">
                <input type="checkbox" id="add_can_upload_excel">
                <label>Разрешить загрузку Excel</label>
            </div>
            <div class="checkbox">
                <input type="checkbox" id="add_can_edit_company_details">
                <label>Разрешить редактировать реквизиты</label>
            </div>
            <button onclick="addEmployee()" style="margin-top: 20px;">Сохранить</button>
            <button onclick="closeAddModal()">Отмена</button>
            <div id="addError" class="error"></div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        let currentUser = null;
        
        if (!token) window.location.href = '/login';
        
        function toggleRightsByRole(type) {
            let roleSelect, uploadCheckbox, editCheckbox;
            if (type === 'add') {
                roleSelect = document.getElementById('add_role');
                uploadCheckbox = document.getElementById('add_can_upload_excel');
                editCheckbox = document.getElementById('add_can_edit_company_details');
            } else {
                roleSelect = document.getElementById('edit_role');
                uploadCheckbox = document.getElementById('edit_can_upload_excel');
                editCheckbox = document.getElementById('edit_can_edit_company_details');
            }
            
            if (roleSelect && roleSelect.value === 'manager') {
                if (uploadCheckbox) uploadCheckbox.disabled = true;
                if (editCheckbox) editCheckbox.disabled = true;
                if (uploadCheckbox) uploadCheckbox.checked = false;
                if (editCheckbox) editCheckbox.checked = false;
            } else {
                if (uploadCheckbox) uploadCheckbox.disabled = false;
                if (editCheckbox) editCheckbox.disabled = false;
            }
        }
        
        async function getCurrentUser() {
            try {
                const response = await fetch(`/api/auth/check?token=${token}`);
                const data = await response.json();
                if (!data.authenticated) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                    return null;
                }
                currentUser = data.user;
                document.getElementById('userName').textContent = data.user.name;
                return data.user;
            } catch(e) {
                return null;
            }
        }
        
        function getRoleBadge(role) {
            if (role === 'dev') return '<span class="role-dev">Разработчик</span>';
            if (role === 'admin') return '<span class="role-admin">Администратор</span>';
            return '<span class="role-manager">Менеджер</span>';
        }
        
        function getStatusBadge(isActive) {
            if (isActive) return '<span class="active-badge">Активен</span>';
            return '<span class="inactive-badge">Неактивен</span>';
        }
        
        function canEditEmployee(targetEmployee) {
            if (!currentUser) return false;
            const isDev = currentUser.role === 'dev';
            const isAdmin = currentUser.role === 'admin';
            const isSelf = currentUser.employee_id === targetEmployee.employee_id;
            const targetRole = targetEmployee.role;
            
            if (isDev) return true;
            if (isAdmin && isSelf) return true;
            if (isAdmin && targetRole === 'manager') return true;
            if (isAdmin && targetRole === 'admin' && isSelf) return true;
            if (isAdmin && targetRole === 'dev') return false;
            if (isSelf && (currentUser.role === 'manager' || currentUser.role === 'admin')) return true;
            return false;
        }
        
        function renderEmployeesTable(employees) {
            if (!employees || employees.length === 0) {
                document.getElementById('employees-table').innerHTML = '<p>📭 Нет сотрудников</p>';
                return;
            }
            
            let html = '<table class="employees-table">';
            html += '<thead><tr style="background:#f5f5f5;">';
            html += '<th style="padding:12px; text-align:left;">ID</th>';
            html += '<th style="padding:12px; text-align:left;">ФИО</th>';
            html += '<th style="padding:12px; text-align:left;">Email</th>';
            html += '<th style="padding:12px; text-align:left;">Телефон</th>';
            html += '<th style="padding:12px; text-align:left;">Роль</th>';
            html += '<th style="padding:12px; text-align:left;">Статус</th>';
            html += '<th style="padding:12px; text-align:left;">Действия</th>';
            html += ' </thead><tbody>';
            
            for (let i = 0; i < employees.length; i++) {
                const e = employees[i];
                const canEdit = canEditEmployee(e);
                const editDisabledClass = !canEdit ? 'disabled' : '';
                const editDisabledAttr = !canEdit ? 'disabled' : '';
                const rowStyle = i % 2 === 0 ? 'background:#ffffff;' : 'background:#f9f9f9;';
                
                html += '<tr style="border-bottom:1px solid #eee; ' + rowStyle + '">';
                html += '<td style="padding:12px;">' + e.employee_id + '</td>';
                html += '<td style="padding:12px;"><strong>' + e.full_name + '</strong></td>';
                html += '<td style="padding:12px;">' + e.email + '</td>';
                html += '<td style="padding:12px;">' + (e.phone || '—') + '</td>';
                html += '<td style="padding:12px;">' + getRoleBadge(e.role) + '</td>';
                html += '<td style="padding:12px;">' + getStatusBadge(e.is_active) + '</td>';
                html += '<td style="padding:12px;">';
                html += '<button class="view-btn" onclick="viewEmployee(' + e.employee_id + ')">👁️ Детали</button>';
                html += '<button class="edit-btn ' + editDisabledClass + '" onclick="editEmployee(' + e.employee_id + ')" ' + editDisabledAttr + '>✏️</button>';
                if (currentUser && currentUser.role === 'dev' && currentUser.employee_id !== e.employee_id) {
                    html += '<button class="delete-btn" onclick="deleteEmployee(' + e.employee_id + ')">🗑️</button>';
                }
                html += '</td>';
                html += '</tr>';
            }
            
            html += '</tbody></table>';
            document.getElementById('employees-table').innerHTML = html;
        }
        
        async function loadEmployees(query = '') {
            try {
                let url = '/api/employees/';
                if (query && query.trim() !== '') {
                    url = `/api/employees/search?query=${encodeURIComponent(query)}`;
                }
                const response = await fetch(url);
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const employees = await response.json();
                renderEmployeesTable(employees);
            } catch(e) {
                console.error('Ошибка загрузки сотрудников:', e);
                document.getElementById('employees-table').innerHTML = '<p>❌ Ошибка загрузки сотрудников: ' + e.message + '</p>';
            }
        }
        
        function searchEmployees() {
            const query = document.getElementById('searchInput').value.trim();
            loadEmployees(query);
        }
        
        function resetSearch() {
            document.getElementById('searchInput').value = '';
            loadEmployees();
        }
        
        function viewEmployee(id) { window.location.href = `/employees/${id}`; }
        function editEmployee(id) { window.location.href = `/employees/${id}/edit`; }
        
        async function deleteEmployee(id) {
            if (!confirm('Удалить сотрудника?')) return;
            try {
                const response = await fetch(`/api/employees/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    alert('✅ Сотрудник удалён');
                    loadEmployees();
                } else alert('❌ Ошибка удаления');
            } catch(e) { alert('❌ Ошибка'); }
        }
        
        function showAddModal() {
            if (currentUser && currentUser.role !== 'dev') {
                alert('Только разработчик может добавлять сотрудников');
                return;
            }
            toggleRightsByRole('add');
            document.getElementById('addModal').style.display = 'block';
        }
        
        function closeAddModal() {
            document.getElementById('addModal').style.display = 'none';
            document.getElementById('add_full_name').value = '';
            document.getElementById('add_email').value = '';
            document.getElementById('add_phone').value = '';
            document.getElementById('add_birth_date').value = '';
            document.getElementById('add_login').value = '';
            document.getElementById('add_password').value = '';
            document.getElementById('add_role').value = 'manager';
            document.getElementById('add_can_upload_excel').checked = false;
            document.getElementById('add_can_edit_company_details').checked = false;
            document.getElementById('addError').textContent = '';
            toggleRightsByRole('add');
        }
        
        async function addEmployee() {
            const full_name = document.getElementById('add_full_name').value.trim();
            const email = document.getElementById('add_email').value.trim();
            const login = document.getElementById('add_login').value.trim();
            const password = document.getElementById('add_password').value;
            const phone = document.getElementById('add_phone').value.trim();
            
            if (!full_name || !email || !login || !password) {
                document.getElementById('addError').textContent = 'Заполните все обязательные поля';
                return;
            }
            
            if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('addError').textContent = 'Введите корректный email (должен содержать @ и .)';
                return;
            }
            
            if (phone && !/^\d{11}$/.test(phone)) {
                document.getElementById('addError').textContent = 'Телефон должен содержать ровно 11 цифр (без +)';
                return;
            }
            
            const employee = {
                full_name: full_name,
                email: email,
                phone: phone ? '+' + phone : null,
                birth_date: document.getElementById('add_birth_date').value || null,
                login: login,
                password: password,
                role: document.getElementById('add_role').value,
                can_upload_excel: document.getElementById('add_can_upload_excel').checked,
                can_edit_company_details: document.getElementById('add_can_edit_company_details').checked
            };
            
            try {
                const response = await fetch('/api/employees/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(employee)
                });
                if (response.ok) {
                    alert('✅ Сотрудник добавлен');
                    closeAddModal();
                    loadEmployees();
                } else {
                    const error = await response.json();
                    document.getElementById('addError').textContent = error.detail || 'Ошибка добавления';
                }
            } catch(e) { 
                document.getElementById('addError').textContent = 'Ошибка подключения к серверу'; 
            }
        }
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchEmployees();
            }
        });
        
        async function logout() {
            const token = localStorage.getItem('token');
            if (token) await fetch(`/api/auth/logout?token=${token}`, { method: 'POST' });
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        getCurrentUser().then(() => loadEmployees());
    </script>
</body>
</html>
