<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TimoFey — Заказы</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .status-paid { background: #27ae60; color: white; padding: 4px 8px; border-radius: 4px; display: inline-block; }
        .status-not_paid { background: #e74c3c; color: white; padding: 4px 8px; border-radius: 4px; display: inline-block; }
        .status-delivered { background: #3498db; color: white; padding: 4px 8px; border-radius: 4px; display: inline-block; }
        .view-btn { background: #3498db; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .view-btn:hover { background: #2980b9; }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; margin-left: 5px; }
        .delete-btn:hover:not(:disabled) { background: #c0392b; }
        .delete-btn:disabled { background: #95a5a6; cursor: not-allowed; opacity: 0.5; }
        .orders-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .orders-table th { background: #f5f5f5; padding: 12px; text-align: left; border-bottom: 1px solid #ddd; font-weight: 600; }
        .orders-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .orders-table tr:hover { background: #f9f9f9; }
        .nav-links a.active { background: #667eea; color: white; }
        .table-container { overflow-x: auto; }
        .create-order-btn { background: #27ae60; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-bottom: 20px; }
        .create-order-btn:hover { background: #219a52; }
        .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="/static/favicon.ico" alt="TimoFey">
                <h1>TimoFey</h1>
            </div>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div class="nav-links">
            <a href="/">📊 Главная</a>
            <a href="/products">🛍️ Товары</a>
            <a href="/orders" class="active">📦 Заказы</a>
            <a href="/customers">👥 Клиенты</a>
            <a href="/employees">👤 Сотрудники</a>
        </div>
        
        <div style="text-align: right; margin-bottom: 20px;">
            <a href="/orders/create" class="create-order-btn">➕ Создать заказ</a>
        </div>
        
        <div class="card">
            <h2>📋 Список заказов</h2>
            <div class="table-container">
                <div id="orders-table">
                    <p>Загрузка...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';
        
        fetch(`/api/auth/check?token=${token}`)
            .then(res => res.json())
            .then(data => {
                if (!data.authenticated) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                } else {
                    document.getElementById('userName').textContent = data.user.name;
                }
            });
        
        function getStatusBadge(status) {
            if (status === 'paid') return '<span class="status-paid">✅ Оплачен</span>';
            if (status === 'not_paid') return '<span class="status-not_paid">⏳ Не оплачен</span>';
            if (status === 'delivered') return '<span class="status-delivered">🚚 Доставлен</span>';
            return status;
        }
        
        function parseDateFromString(dateStr) {
            if (!dateStr) return null;
            const parts = dateStr.split(' ')[0].split('.');
            if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]);
            return null;
        }
        
        async function loadOrders() {
            try {
                const response = await fetch('/api/orders/');
                const orders = await response.json();
                
                if (orders.length === 0) {
                    document.getElementById('orders-table').innerHTML = '<p>📭 Нет заказов</p>';
                    return;
                }
                
                let html = '<table class="orders-table">';
                html += '<thead> <th>№</th><th>Клиент</th><th>Телефон</th><th>Сумма</th><th>Статус</th><th>Дата</th><th>Действия</th> </thead><tbody>';
                
                const today = new Date();
                
                for (let i = 0; i < orders.length; i++) {
                    const o = orders[i];
                    
                    let canDelete = false;
                    if (o.status === 'not_paid' && o.created_at) {
                        const orderDate = parseDateFromString(o.created_at);
                        if (orderDate) {
                            const daysDiff = Math.floor((today - orderDate) / (1000 * 60 * 60 * 24));
                            canDelete = daysDiff >= 30;
                        }
                    }
                    
                    html += ' 3 ';
                    html += ' <td style="padding:12px;">' + o.order_id + '  ';
                    html += ' <td style="padding:12px;">' + (o.customer_name || '—') + '  ';
                    html += ' <td style="padding:12px;">' + (o.customer_phone || '—') + '  ';
                    html += ' <td style="padding:12px;">' + (o.total_amount ? o.total_amount.toLocaleString() : '0') + ' ₽  ';
                    html += ' <td style="padding:12px;">' + getStatusBadge(o.status) + '  ';
                    html += ' <td style="padding:12px;">' + (o.created_at || '—') + '  ';
                    html += ' <td style="padding:12px;"><button class="view-btn" onclick="viewOrder(' + o.order_id + ')">👁️ Детали</button>';
                    if (canDelete) {
                        html += '<button class="delete-btn" onclick="deleteOrder(' + o.order_id + ')">🗑️</button>';
                    } else {
                        html += '<button class="delete-btn" disabled>🗑️</button>';
                    }
                    html += '  ';
                    html += '  ';
                }
                
                html += '</tbody>  </div>';
                document.getElementById('orders-table').innerHTML = html;
            } catch(e) {
                document.getElementById('orders-table').innerHTML = '<p>❌ Ошибка загрузки заказов</p>';
            }
        }
        
        function viewOrder(id) { window.location.href = `/orders/${id}`; }
        
        function deleteOrder(id) {
            if (confirm('Удалить заказ? Это действие нельзя отменить.')) {
                fetch(`/api/orders/${id}`, { method: 'DELETE' })
                    .then(res => res.ok ? (alert('✅ Заказ удалён'), loadOrders()) : alert('❌ Ошибка удаления'));
            }
        }
        
        async function logout() {
            const token = localStorage.getItem('token');
            if (token) await fetch(`/api/auth/logout?token=${token}`, { method: 'POST' });
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        loadOrders();
    </script>
</body>
</html>
