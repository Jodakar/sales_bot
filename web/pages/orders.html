<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TimoFey — Заказы</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .status-paid {
            background: #27ae60;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        .status-not_paid {
            background: #e74c3c;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        .status-delivered {
            background: #3498db;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        .view-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 5px;
        }
        .view-btn:hover {
            background: #2980b9;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background: #c0392b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="/static/favicon.ico" alt="TimoFey">
                <h1>TimoFey</h1>
            </div>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div class="nav-links">
            <a href="/">📊 Главная</a>
            <a href="/products">🛍️ Товары</a>
            <a href="/orders">📦 Заказы</a>
            <a href="/customers">👥 Клиенты</a>
        </div>
        
        <div class="card">
            <h2>📋 Список заказов</h2>
            <div id="orders-table">
                <p>Загрузка...</p>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
        }
        
        fetch(`/api/auth/check?token=${token}`)
            .then(res => res.json())
            .then(data => {
                if (!data.authenticated) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                } else {
                    document.getElementById('userName').textContent = data.user.name;
                }
            });
        
        function getStatusBadge(status) {
            if (status === 'paid') return '<span class="status-paid">✅ Оплачен</span>';
            if (status === 'not_paid') return '<span class="status-not_paid">⏳ Не оплачен</span>';
            if (status === 'delivered') return '<span class="status-delivered">🚚 Доставлен</span>';
            return status;
        }
        
        async function loadOrders() {
            try {
                const response = await fetch('/api/orders/');
                const orders = await response.json();
                
                if (orders.length === 0) {
                    document.getElementById('orders-table').innerHTML = '<p>📭 Нет заказов</p>';
                    return;
                }
                
                let html = '<table>';
                html += '<thead><tr>';
                html += '<th>№</th>';
                html += '<th>Клиент</th>';
                html += '<th>Телефон</th>';
                html += '<th>Сумма</th>';
                html += '<th>Статус</th>';
                html += '<th>Дата</th>';
                html += '<th>Действия</th>';
                html += '</tr></thead><tbody>';
                
                orders.forEach(o => {
                    html += '<tr>';
                    html += `<td>${o.order_id}</td>`;
                    html += `<td>${o.customer_name}</td>`;
                    html += `<td>${o.customer_phone}</td>`;
                    html += `<td>${o.total_amount.toLocaleString()} ₽</td>`;
                    html += `<td>${getStatusBadge(o.status)}</td>`;
                    html += `<td>${o.created_at}</td>`;
                    html += `<td>
                                <button class="view-btn" onclick="viewOrder(${o.order_id})">👁️ Детали</button>
                                <button class="delete-btn" onclick="deleteOrder(${o.order_id})">🗑️</button>
                            </td>`;
                    html += '</tr>';
                });
                
                html += '</tbody></table>';
                document.getElementById('orders-table').innerHTML = html;
            } catch(e) {
                document.getElementById('orders-table').innerHTML = '<p>❌ Ошибка загрузки заказов</p>';
            }
        }
        
        function viewOrder(id) {
            window.location.href = `/orders/${id}`;
        }
        
        function deleteOrder(id) {
            if (!confirm('Удалить заказ?')) return;
            fetch(`/api/orders/${id}`, { method: 'DELETE' })
                .then(res => {
                    if (res.ok) {
                        alert('✅ Заказ удалён');
                        loadOrders();
                    } else {
                        alert('❌ Ошибка удаления');
                    }
                });
        }
        
        async function logout() {
            const token = localStorage.getItem('token');
            if (token) {
                await fetch(`/api/auth/logout?token=${token}`, { method: 'POST' });
            }
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        loadOrders();
    </script>
</body>
</html>
