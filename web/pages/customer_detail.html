<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TimoFey — Клиент</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .detail-card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .back-btn { background: #95a5a6; margin-bottom: 20px; padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; color: white; }
        .back-btn:hover { background: #7f8c8d; }
        .status-paid { background: #27ae60; color: white; padding: 4px 8px; border-radius: 4px; display: inline-block; }
        .status-not_paid { background: #e74c3c; color: white; padding: 4px 8px; border-radius: 4px; display: inline-block; }
        .status-delivered { background: #3498db; color: white; padding: 4px 8px; border-radius: 4px; display: inline-block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f5f5f5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="/static/favicon.ico" alt="TimoFey">
                <h1>TimoFey</h1>
            </div>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div class="nav-links">
            <a href="/">📊 Главная</a>
            <a href="/products">🛍️ Товары</a>
            <a href="/orders">📦 Заказы</a>
            <a href="/customers">👥 Клиенты</a>
        </div>
        
        <button class="back-btn" onclick="window.location.href='/customers'">← Назад к клиентам</button>
        
        <div id="customer-detail">
            <p>Загрузка...</p>
        </div>
    </div>

    <script>
        const customer_id = {{customer_id}};
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';
        
        fetch(`/api/auth/check?token=${token}`)
            .then(res => res.json())
            .then(data => {
                if (!data.authenticated) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                } else {
                    document.getElementById('userName').textContent = data.user.name;
                }
            });
        
        function getStatusBadge(status) {
            if (status === 'paid') return '<span class="status-paid">✅ Оплачен</span>';
            if (status === 'not_paid') return '<span class="status-not_paid">⏳ Не оплачен</span>';
            if (status === 'delivered') return '<span class="status-delivered">🚚 Доставлен</span>';
            return status;
        }
        
        async function loadCustomer() {
            try {
                const response = await fetch(`/api/customers/${customer_id}`);
                const customer = await response.json();
                
                let ordersHtml = '<h3>📋 Заказы клиента</h3><table><thead><tr><th>№</th><th>Сумма</th><th>Статус</th><th>Дата</th></tr></thead><tbody>';
                if (customer.orders && customer.orders.length > 0) {
                    customer.orders.forEach(o => {
                        ordersHtml += `<tr>
                            <td><a href="/orders/${o.order_id}">#${o.order_id}</a></td>
                            <td>${o.total_amount.toLocaleString()} ₽</td>
                            <td>${getStatusBadge(o.status)}</td>
                            <td>${o.created_at}</td>
                        </tr>`;
                    });
                } else {
                    ordersHtml += '<tr><td colspan="4">Нет заказов</td></tr>';
                }
                ordersHtml += '</tbody></table>';
                
                document.getElementById('customer-detail').innerHTML = `
                    <div class="detail-card">
                        <h2>👤 ${customer.full_name}</h2>
                        <p><strong>📞 Телефон:</strong> ${customer.phone || '—'}</p>
                        <p><strong>📧 Email:</strong> ${customer.email || '—'}</p>
                        <p><strong>📍 Адрес:</strong> ${customer.address || '—'}</p>
                        <p><strong>📱 Telegram:</strong> ${customer.telegram || '—'}</p>
                        <p><strong>💬 WhatsApp:</strong> ${customer.whatsapp || '—'}</p>
                        <p><strong>📅 Дата регистрации:</strong> ${customer.created_at || '—'}</p>
                        <p><strong>🕒 Последний заказ:</strong> ${customer.last_order_date || '—'}</p>
                        <hr>
                        ${ordersHtml}
                    </div>
                `;
            } catch(e) {
                document.getElementById('customer-detail').innerHTML = '<p>❌ Ошибка загрузки данных клиента</p>';
            }
        }
        
        async function logout() {
            const token = localStorage.getItem('token');
            if (token) await fetch(`/api/auth/logout?token=${token}`, { method: 'POST' });
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        loadCustomer();
    </script>
</body>
</html>
