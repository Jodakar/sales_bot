<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TimoFey — Товары</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-section input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .search-section button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .search-section button:hover {
            background: #2980b9;
        }
        .import-section {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .import-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .import-btn:hover:not(:disabled) {
            background: #219a52;
        }
        .import-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .export-btn {
            background: #f39c12;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .export-btn:hover {
            background: #e67e22;
        }
        .products-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .products-table th {
            background: #f5f5f5;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #ddd;
            font-weight: 600;
        }
        .products-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .products-table tr:hover {
            background: #f9f9f9;
        }
        .products-table tr:nth-child(even) {
            background: #ffffff;
        }
        .products-table tr:nth-child(odd) {
            background: #f9f9f9;
        }
        .view-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .view-btn:hover {
            background: #2980b9;
        }
        .nav-links a.active {
            background: #667eea;
            color: white;
        }
        .table-container {
            overflow-x: auto;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="/static/favicon.ico" alt="TimoFey">
                <h1>TimoFey</h1>
            </div>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div class="nav-links">
            <a href="/">📊 Главная</a>
            <a href="/products" class="active">🛍️ Товары</a>
            <a href="/orders">📦 Заказы</a>
            <a href="/customers">👥 Клиенты</a>
            <a href="/employees">👤 Сотрудники</a>
        </div>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Поиск по ID, названию, артикулу, производителю...">
            <button onclick="searchProducts()">🔍 Найти</button>
            <button onclick="resetSearch()">✖️ Сброс</button>
        </div>
        
        <div class="import-section">
            <button class="export-btn" onclick="exportToExcel()">📤 Выгрузить в Excel</button>
            <button id="importBtn" class="import-btn" disabled>📂 Импорт из Excel</button>
        </div>
        
        <div class="card">
            <h2>📦 Каталог товаров</h2>
            <div class="table-container">
                <div id="products-table">
                    <p>Загрузка...</p>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".xlsx, .xls" style="display: none;">

    <script>
        const token = localStorage.getItem('token');
        let currentUser = null;
        let allProducts = [];
        
        if (!token) {
            window.location.href = '/login';
        }
        
        async function getCurrentUser() {
            try {
                const response = await fetch(`/api/auth/check?token=${token}`);
                const data = await response.json();
                if (!data.authenticated) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                    return null;
                }
                currentUser = data.user;
                document.getElementById('userName').textContent = data.user.name;
                
                const hasImportRights = data.user.role === 'dev';
                const importBtn = document.getElementById('importBtn');
                if (hasImportRights) {
                    importBtn.disabled = false;
                    importBtn.title = 'Загрузить товары из Excel-файла';
                } else {
                    importBtn.disabled = true;
                    importBtn.title = 'У вас нет прав на импорт товаров';
                }
                return data.user;
            } catch(e) {
                return null;
            }
        }
        
        async function loadProducts(query = '') {
            try {
                let url = '/api/products/';
                if (query && query.trim() !== '') {
                    url = `/api/products/search?query=${encodeURIComponent(query)}`;
                }
                const response = await fetch(url);
                const products = await response.json();
                allProducts = products;
                renderProductsTable(products);
            } catch(e) {
                document.getElementById('products-table').innerHTML = '<p>❌ Ошибка загрузки товаров</p>';
            }
        }
        
        function renderProductsTable(products) {
            if (products.length === 0) {
                document.getElementById('products-table').innerHTML = '<p>📭 Нет товаров в каталоге</p>';
                return;
            }
            
            let html = '<table class="products-table">';
            html += '<thead>';
            html += '<tr style="background:#f5f5f5;">';
            html += '<th style="padding:12px; text-align:left; border-bottom:2px solid #ddd;">ID</th>';
            html += '<th style="padding:12px; text-align:left; border-bottom:2px solid #ddd;">Артикул</th>';
            html += '<th style="padding:12px; text-align:left; border-bottom:2px solid #ddd;">Название</th>';
            html += '<th style="padding:12px; text-align:left; border-bottom:2px solid #ddd;">Цена</th>';
            html += '<th style="padding:12px; text-align:left; border-bottom:2px solid #ddd;">Остаток</th>';
            html += '<th style="padding:12px; text-align:left; border-bottom:2px solid #ddd;">Действия</th>';
            html += ' </thead><tbody>';
            
            for (let i = 0; i < products.length; i++) {
                const p = products[i];
                const rowStyle = i % 2 === 0 ? 'background:#ffffff;' : 'background:#f9f9f9;';
                html += `<tr style="border-bottom:1px solid #eee; ${rowStyle}">`;
                html += `<td style="padding:12px;">${p.product_id}</td>`;
                html += `<td style="padding:12px;">${p.article || '—'}</td>`;
                html += `<td style="padding:12px;"><strong>${p.name}</strong></td>`;
                html += `<td style="padding:12px;">${p.price.toLocaleString()} ₽</td>`;
                html += `<td style="padding:12px;">${p.stock} шт</td>`;
                html += `<td style="padding:12px;"><button class="view-btn" onclick="viewProduct(${p.product_id})">👁️ Детали</button></td>`;
                html += `</tr>`;
            }
            
            html += '</tbody></table>';
            document.getElementById('products-table').innerHTML = html;
        }
        
        function searchProducts() {
            const query = document.getElementById('searchInput').value.trim();
            loadProducts(query);
        }
        
        function resetSearch() {
            document.getElementById('searchInput').value = '';
            loadProducts();
        }
        
        function viewProduct(id) {
            window.location.href = `/products/${id}`;
        }
        
        async function exportToExcel() {
            try {
                const response = await fetch('/api/products/export-excel');
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `products_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                    alert('✅ Выгрузка завершена');
                } else {
                    alert('❌ Ошибка выгрузки');
                }
            } catch(e) {
                alert('❌ Ошибка');
            }
        }
        
        async function importExcel(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch('/api/products/import-excel', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert('✅ Импорт завершён успешно!\n\n' + 
                          'Добавлено: ' + (result.added || 0) + ' товаров\n' +
                          'Обновлено: ' + (result.updated || 0) + ' товаров\n' +
                          'Ошибок: ' + (result.errors || 0));
                    loadProducts();
                } else {
                    let errorMsg = '❌ Ошибка импорта:\n' + (result.detail || 'Неизвестная ошибка');
                    alert(errorMsg);
                }
            } catch(e) {
                alert('❌ Ошибка подключения к серверу');
            }
        }
        
        document.getElementById('importBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext !== 'xlsx' && ext !== 'xls') {
                alert('❌ Неверный формат файла\n\nПоддерживаемые форматы: .xlsx, .xls');
                e.target.value = '';
                return;
            }
            importExcel(file);
            e.target.value = '';
        });
        
        // Поиск по Enter
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchProducts();
            }
        });
        
        async function logout() {
            const token = localStorage.getItem('token');
            if (token) {
                await fetch(`/api/auth/logout?token=${token}`, { method: 'POST' });
            }
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        getCurrentUser().then(() => {
            loadProducts();
        });
    </script>
</body>
</html>
