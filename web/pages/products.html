<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TimoFey — Товары</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .import-section {
            text-align: right;
            margin-bottom: 20px;
        }
        .import-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .import-btn:hover:not(:disabled) {
            background: #219a52;
        }
        .import-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .view-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .view-btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="/static/favicon.ico" alt="TimoFey">
                <h1>TimoFey</h1>
            </div>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div class="nav-links">
            <a href="/">📊 Главная</a>
            <a href="/products" class="active">🛍️ Товары</a>
            <a href="/orders">📦 Заказы</a>
            <a href="/customers">👥 Клиенты</a>
            <a href="/employees">👤 Сотрудники</a>
        </div>
        
        <div class="import-section">
            <button id="importBtn" class="import-btn" disabled>📂 Импорт из Excel</button>
        </div>
        
        <div class="card">
            <h2>📦 Каталог товаров</h2>
            <div class="table-container">
                <div id="products-table">
                    <p>Загрузка...</p>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".xlsx, .xls" style="display: none;">

    <script>
        const token = localStorage.getItem('token');
        let currentUser = null;
        
        if (!token) {
            window.location.href = '/login';
        }
        
        async function checkAuthAndPermissions() {
            try {
                const response = await fetch(`/api/auth/check?token=${token}`);
                const data = await response.json();
                
                if (!data.authenticated) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                    return false;
                }
                
                currentUser = data.user;
                document.getElementById('userName').textContent = data.user.name;
                
                const hasImportRights = data.user.name === 'Администратор' || data.user.role === 'dev' || data.user.role === 'admin';
                const importBtn = document.getElementById('importBtn');
                
                if (hasImportRights) {
                    importBtn.disabled = false;
                    importBtn.title = 'Загрузить товары из Excel-файла';
                } else {
                    importBtn.disabled = true;
                    importBtn.title = 'У вас нет прав на импорт товаров';
                }
                
                return true;
            } catch(e) {
                console.error('Ошибка проверки авторизации:', e);
                return false;
            }
        }
        
        async function loadProducts() {
            try {
                const response = await fetch('/api/products/');
                const products = await response.json();
                
                if (products.length === 0) {
                    document.getElementById('products-table').innerHTML = '<p>📭 Нет товаров в каталоге</p>';
                    return;
                }
                
                let html = '<table>';
                html += '<thead> <th>ID</th><th>Артикул</th><th>Название</th><th>Цена</th><th>Остаток</th><th>Действия</th> </thead><tbody>';
                
                for (let i = 0; i < products.length; i++) {
                    const p = products[i];
                    html += ' 3 ';
                    html += ' <td>' + p.product_id + '  ';
                    html += ' <td>' + (p.article || '—') + '  ';
                    html += ' <td>' + p.name + '  ';
                    html += ' <td>' + p.price.toLocaleString() + ' ₽  ';
                    html += ' <td>' + p.stock + ' шт  ';
                    html += ' <td><button class="view-btn" onclick="viewProduct(' + p.product_id + ')">👁️ Детали</button>  ';
                    html += '  ';
                }
                
                html += '</tbody>  </div>';
                document.getElementById('products-table').innerHTML = html;
            } catch(e) {
                document.getElementById('products-table').innerHTML = '<p>❌ Ошибка загрузки товаров</p>';
            }
        }
        
        function viewProduct(id) {
            window.location.href = `/products/${id}`;
        }
        
        async function importExcel(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch('/api/products/import-excel', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert('✅ Импорт завершён успешно!\n\n' + 
                          'Добавлено: ' + (result.added || 0) + ' товаров\n' +
                          'Обновлено: ' + (result.updated || 0) + ' товаров\n' +
                          'Ошибок: ' + (result.errors || 0));
                    loadProducts();
                } else {
                    let errorMsg = '❌ Ошибка импорта:\n' + (result.detail || 'Неизвестная ошибка');
                    if (result.errors_list && result.errors_list.length) {
                        errorMsg += '\n\nДетали:\n' + result.errors_list.join('\n');
                    }
                    alert(errorMsg);
                }
            } catch(e) {
                alert('❌ Ошибка подключения к серверу\n\nПроверьте:\n1. Сервер запущен\n2. Интернет-соединение');
            }
        }
        
        document.getElementById('importBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext !== 'xlsx' && ext !== 'xls') {
                alert('❌ Неверный формат файла\n\nПоддерживаемые форматы: .xlsx, .xls');
                e.target.value = '';
                return;
            }
            
            importExcel(file);
            e.target.value = '';
        });
        
        async function logout() {
            const token = localStorage.getItem('token');
            if (token) {
                await fetch(`/api/auth/logout?token=${token}`, { method: 'POST' });
            }
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        checkAuthAndPermissions().then(() => {
            loadProducts();
        });
    </script>
</body>
</html>
