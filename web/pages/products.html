<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TimoFey — Товары</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .add-product {
            text-align: right;
            margin-bottom: 20px;
        }
        .add-product button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .add-product button:hover {
            background: #219a52;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #f5f5f5;
        }
        .edit-btn {
            background: #f39c12;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 5px;
        }
        .edit-btn:hover {
            background: #e67e22;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="/static/favicon.ico" alt="TimoFey">
                <h1>TimoFey</h1>
            </div>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div class="nav-links">
            <a href="/">📊 Главная</a>
            <a href="/products">🛍️ Товары</a>
            <a href="/orders">📦 Заказы</a>
            <a href="/customers">👥 Клиенты</a>
        </div>
        
        <div class="add-product">
            <button onclick="showAddForm()">➕ Добавить товар</button>
        </div>
        
        <div class="card">
            <h2>📦 Каталог товаров</h2>
            <div id="products-table">
                <p>Загрузка...</p>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
        }
        
        fetch(`/api/auth/check?token=${token}`)
            .then(res => res.json())
            .then(data => {
                if (!data.authenticated) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                } else {
                    document.getElementById('userName').textContent = data.user.name;
                }
            });
        
        async function loadProducts() {
            try {
                const response = await fetch('/api/products/');
                const products = await response.json();
                
                if (products.length === 0) {
                    document.getElementById('products-table').innerHTML = '<p>📭 Нет товаров в каталоге</p>';
                    return;
                }
                
                let html = '<table>';
                html += '<thead><tr>';
                html += '<th>ID</th>';
                html += '<th>Артикул</th>';
                html += '<th>Название</th>';
                html += '<th>Цена</th>';
                html += '<th>Остаток</th>';
                html += '<th>Действия</th>';
                html += '</tr></thead><tbody>';
                
                products.forEach(p => {
                    html += '<tr>';
                    html += `<td>${p.product_id}</td>`;
                    html += `<td>${p.article || '—'}</td>`;
                    html += `<td>${p.name}</td>`;
                    html += `<td>${p.price.toLocaleString()} ₽</td>`;
                    html += `<td>${p.stock} шт</td>`;
                    html += `<td>
                                <button class="edit-btn" onclick="editProduct(${p.product_id})">✏️</button>
                                <button class="delete-btn" onclick="deleteProduct(${p.product_id})">🗑️</button>
                            </td>`;
                    html += '</tr>';
                });
                
                html += '</tbody></table>';
                document.getElementById('products-table').innerHTML = html;
            } catch(e) {
                document.getElementById('products-table').innerHTML = '<p>❌ Ошибка загрузки товаров</p>';
            }
        }
        
        function showAddForm() {
            const name = prompt('Введите название товара:');
            if (!name) return;
            const price = parseFloat(prompt('Введите цену (руб):'));
            if (isNaN(price)) return;
            const stock = parseInt(prompt('Введите остаток (шт):'));
            if (isNaN(stock)) return;
            
            fetch('/api/products/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, price, stock })
            }).then(res => {
                if (res.ok) {
                    alert('✅ Товар добавлен');
                    loadProducts();
                } else {
                    alert('❌ Ошибка добавления');
                }
            });
        }
        
        function editProduct(id) {
            const price = prompt('Введите новую цену:');
            if (price === null) return;
            const stock = prompt('Введите новый остаток:');
            if (stock === null) return;
            
            fetch(`/api/products/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ price: parseFloat(price), stock: parseInt(stock) })
            }).then(res => {
                if (res.ok) {
                    alert('✅ Товар обновлён');
                    loadProducts();
                } else {
                    alert('❌ Ошибка обновления');
                }
            });
        }
        
        function deleteProduct(id) {
            if (!confirm('Удалить товар?')) return;
            fetch(`/api/products/${id}`, { method: 'DELETE' })
                .then(res => {
                    if (res.ok) {
                        alert('✅ Товар удалён');
                        loadProducts();
                    } else {
                        alert('❌ Ошибка удаления');
                    }
                });
        }
        
        async function logout() {
            const token = localStorage.getItem('token');
            if (token) {
                await fetch(`/api/auth/logout?token=${token}`, { method: 'POST' });
            }
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        loadProducts();
    </script>
</body>
</html>
