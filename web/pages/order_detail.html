<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TimoFey — Заказ #{{order_id}}</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .detail-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .status-select {
            padding: 8px;
            border-radius: 5px;
            margin-right: 10px;
        }
        .items-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        .items-table th, .items-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .items-table th {
            background: #f5f5f5;
        }
        .back-btn {
            background: #95a5a6;
            margin-bottom: 20px;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
        }
        .back-btn:hover {
            background: #7f8c8d;
        }
        .status-paid {
            background: #27ae60;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        .status-not_paid {
            background: #e74c3c;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        .status-delivered {
            background: #3498db;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="/static/favicon.ico" alt="TimoFey">
                <h1>TimoFey</h1>
            </div>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div class="nav-links">
            <a href="/">📊 Главная</a>
            <a href="/products">🛍️ Товары</a>
            <a href="/orders">📦 Заказы</a>
            <a href="/customers">👥 Клиенты</a>
        </div>
        
        <button class="back-btn" onclick="window.location.href='/orders'">← Назад к заказам</button>
        
        <div id="order-detail">
            <p>Загрузка...</p>
        </div>
    </div>

    <script>
        const order_id = {{order_id}};
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
        }
        
        fetch(`/api/auth/check?token=${token}`)
            .then(res => res.json())
            .then(data => {
                if (!data.authenticated) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                } else {
                    document.getElementById('userName').textContent = data.user.name;
                }
            });
        
        function getStatusBadge(status) {
            if (status === 'paid') return '<span class="status-paid">✅ Оплачен</span>';
            if (status === 'not_paid') return '<span class="status-not_paid">⏳ Не оплачен</span>';
            if (status === 'delivered') return '<span class="status-delivered">🚚 Доставлен</span>';
            return status;
        }
        
        async function loadOrder() {
            try {
                const response = await fetch(`/api/orders/${order_id}`);
                const order = await response.json();
                
                let itemsHtml = '<h3>Товары в заказе</h3><table class="items-table"><thead> <th>Товар</th><th>Кол-во</th><th>Цена</th><th>Сумма</th> </thead><tbody>';
                if (order.items && order.items.length > 0) {
                    order.items.forEach(item => {
                        itemsHtml += ` <td>${item.product_name}</td> <td>${item.quantity} шт</td> <td>${item.price.toLocaleString()} ₽</td> <td>${item.total.toLocaleString()} ₽</td>  `;
                    });
                }
                itemsHtml += '</tbody> 扭';
                
                let addressText = order.customer_address || '—';
                let commentText = order.comment || '—';
                let notPaidSelected = order.status === 'not_paid' ? 'selected' : '';
                let paidSelected = order.status === 'paid' ? 'selected' : '';
                let deliveredSelected = order.status === 'delivered' ? 'selected' : '';
                
                document.getElementById('order-detail').innerHTML = `
                    <div class="detail-card">
                        <h2>📦 Заказ #${order.order_id}</h2>
                        <p><strong>👤 Клиент:</strong> ${order.customer_name}</p>
                        <p><strong>📞 Телефон:</strong> ${order.customer_phone}</p>
                        <p><strong>📍 Адрес:</strong> ${addressText}</p>
                        <p><strong>🚚 Доставка:</strong> ${order.delivery_method}</p>
                        <p><strong>📝 Комментарий:</strong> ${commentText}</p>
                        <p><strong>💰 Сумма:</strong> ${order.total_amount.toLocaleString()} ₽</p>
                        <p><strong>📅 Дата:</strong> ${order.created_at}</p>
                        <p><strong>📊 Статус:</strong> ${getStatusBadge(order.status)}</p>
                        <div style="margin-top: 15px;">
                            <select id="status-select" class="status-select">
                                <option value="not_paid" ${notPaidSelected}>⏳ Не оплачен</option>
                                <option value="paid" ${paidSelected}>✅ Оплачен</option>
                                <option value="delivered" ${deliveredSelected}>🚚 Доставлен</option>
                            </select>
                            <button onclick="updateStatus(${order.order_id})">Изменить статус</button>
                        </div>
                    </div>
                    ${itemsHtml}
                `;
            } catch(e) {
                document.getElementById('order-detail').innerHTML = '<p>❌ Ошибка загрузки заказа</p>';
            }
        }
        
        async function updateStatus(orderId) {
            const status = document.getElementById('status-select').value;
            try {
                const response = await fetch(`/api/orders/${orderId}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                if (response.ok) {
                    alert('✅ Статус обновлён');
                    loadOrder();
                } else {
                    alert('❌ Ошибка обновления');
                }
            } catch(e) {
                alert('❌ Ошибка');
            }
        }
        
        async function logout() {
            const token = localStorage.getItem('token');
            if (token) {
                await fetch(`/api/auth/logout?token=${token}`, { method: 'POST' });
            }
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        loadOrder();
    </script>
</body>
</html>
