<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TimoFeyA — Заказ</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .detail-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .items-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        .items-table th, .items-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .items-table th {
            background: #f5f5f5;
            font-weight: 600;
        }
        .back-btn {
            background: #95a5a6;
            margin-bottom: 20px;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
        }
        .back-btn:hover {
            background: #7f8c8d;
        }
        .status-paid {
            background: #27ae60;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        .status-not_paid {
            background: #e74c3c;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        .status-delivered {
            background: #3498db;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        .edit-order-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }
        .edit-order-btn:hover {
            background: #2980b9;
        }
        .send-info-btn {
            background: #9b59b6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }
        .send-info-btn:hover {
            background: #8e44ad;
        }
        .history-btn {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        .history-btn:hover {
            background: #7f8c8d;
        }
        .save-comment-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }
        .save-comment-btn:hover {
            background: #219a52;
        }
        .comment-edit {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 5px;
        }
        .comment-edit textarea {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            resize: vertical;
        }
        .messenger-btn {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            margin-right: 10px;
        }
        .telegram-btn {
            background: #26A5E4;
            color: white;
        }
        .telegram-btn:hover {
            background: #1e8bc3;
        }
        .whatsapp-btn {
            background: #25D366;
            color: white;
        }
        .whatsapp-btn:hover {
            background: #1da851;
        }
        .table-container {
            overflow-x: auto;
        }
        .nav-links a.active {
            background: #667eea;
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 20px;
            width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 10px;
            position: relative;
        }
        .close {
            position: absolute;
            top: 10px;
            right: 20px;
            cursor: pointer;
            font-size: 24px;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }
        .history-table th, .history-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .history-table th {
            background: #f5f5f5;
        }
        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="/static/favicon.ico" alt="TimoFeyA">
                <h1>TimoFeyA</h1>
            </div>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div class="nav-links">
            <a href="/">📊 Главная</a>
            <a href="/products">🛍️ Товары</a>
            <a href="/orders" class="active">📦 Заказы</a>
            <a href="/customers">👥 Клиенты</a>
            <a href="/employees">👤 Сотрудники</a>
        </div>
        
        <button class="back-btn" onclick="window.location.href='/orders'">← Назад к заказам</button>
        
        <div id="order-detail">
            <p>Загрузка...</p>
        </div>
    </div>

    <!-- Модальное окно истории статусов -->
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeHistoryModal()">&times;</span>
            <h3>📜 История изменений</h3>
            <div id="history-content">Загрузка...</div>
        </div>
    </div>

    <!-- Модальное окно выбора сотрудников доставки -->
    <div id="deliveryModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeDeliveryModal()">&times;</span>
            <h3>🚚 Отправить заказ в доставку</h3>
            <p>Выберите сотрудников доставки, которые получат уведомление:</p>
            <div id="deliveryEmployeesList"></div>
            <button onclick="sendToDelivery()" style="margin-top: 20px;">📨 Отправить</button>
            <div id="deliveryError" style="color: red; margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        const order_id = window.location.pathname.split('/').pop();
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/login';
        }
        
        let orderData = null;
        let deliveryEmployees = [];
        
        fetch(`/api/auth/check?token=${token}`)
            .then(res => res.json())
            .then(data => {
                if (!data.authenticated) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                } else {
                    document.getElementById('userName').textContent = data.user.name;
                }
            });
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function getStatusBadge(status) {
            if (status === 'paid') return '<span class="status-paid">✅ Оплачен</span>';
            if (status === 'not_paid') return '<span class="status-not_paid">⏳ Не оплачен</span>';
            if (status === 'delivered') return '<span class="status-delivered">🚚 Доставлен</span>';
            return status;
        }
        
        function getMessengerButtons() {
            const phone = orderData ? orderData.customer_phone : null;
            if (!phone) return '';
            
            const cleanPhone = phone.replace(/[^0-9]/g, '');
            if (cleanPhone.length < 10) return '';
            
            const telegramLink = `https://t.me/+${cleanPhone}`;
            const whatsappLink = `https://wa.me/${cleanPhone}`;
            
            return `
                <a href="${telegramLink}" target="_blank" class="messenger-btn telegram-btn">📱 Telegram</a>
                <a href="${whatsappLink}" target="_blank" class="messenger-btn whatsapp-btn">💬 WhatsApp</a>
            `;
        }
        
        async function sendInfoToCustomer() {
            try {
                const response = await fetch(`/api/orders/${order_id}/send-info`, {
                    method: 'POST'
                });
                const result = await response.json();
                if (response.ok) {
                    alert('✅ Информация о заказе отправлена клиенту на email');
                } else {
                    alert('❌ Ошибка: ' + (result.detail || 'Неизвестная ошибка'));
                }
            } catch(e) {
                alert('❌ Ошибка подключения к серверу');
            }
        }
        
        async function saveComment() {
            const newComment = document.getElementById('comment_textarea').value;
            
            try {
                const response = await fetch(`/api/orders/${order_id}/comment`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ comment: newComment })
                });
                
                if (response.ok) {
                    alert('✅ Комментарий сохранён');
                    loadOrder();
                } else {
                    const error = await response.json();
                    alert('❌ Ошибка: ' + (error.detail || 'Неизвестная ошибка'));
                }
            } catch(e) {
                alert('❌ Ошибка подключения к серверу');
            }
        }
        
        async function showStatusHistory() {
            document.getElementById('historyModal').style.display = 'block';
            document.getElementById('history-content').innerHTML = 'Загрузка...';
            
            try {
                const response = await fetch(`/api/orders/${order_id}/status-history`);
                const history = await response.json();
                
                if (history.length === 0) {
                    document.getElementById('history-content').innerHTML = '<p>История пуста</p>';
                    return;
                }
                
                let html = '<table class="history-table"><thead> ';
                html += '<th style="padding:8px;">Дата</th>';
                html += '<th style="padding:8px;">Что изменилось</th>';
                html += '<th style="padding:8px;">Стало</th>';
                html += '<th style="padding:8px;">Кто изменил</th>';
                html += ' </thead><tbody>';
                
                for (let i = 0; i < history.length; i++) {
                    const h = history[i];
                    
                    let whatChanged = '';
                    let newValue = '';
                    
                    if (h.old_status === 'comment_update' || h.new_status === 'comment_update') {
                        whatChanged = '📝 Комментарий';
                        if (h.file_path && h.file_path.includes('→')) {
                            const parts = h.file_path.split('→');
                            let newValueRaw = parts[1].trim();
                            newValueRaw = newValueRaw.replace(/^Стало:\s*/i, '');
                            newValue = newValueRaw;
                        } else {
                            newValue = h.new_status || '—';
                        }
                    } else if (h.old_status === 'not_paid' && h.new_status === 'paid') {
                        whatChanged = '💰 Статус оплаты';
                        newValue = 'Оплачен';
                    } else if (h.old_status === 'paid' && h.new_status === 'delivered') {
                        whatChanged = '🚚 Статус доставки';
                        newValue = 'Доставлен';
                    } else if (h.old_status === 'not_paid' && h.new_status === 'delivered') {
                        whatChanged = '📦 Статус заказа';
                        newValue = 'Доставлен';
                    } else {
                        whatChanged = '📊 Статус заказа';
                        const statusMap = {
                            'not_paid': 'Не оплачен',
                            'paid': 'Оплачен',
                            'delivered': 'Доставлен'
                        };
                        newValue = statusMap[h.new_status] || h.new_status || '—';
                    }
                    
                    let formattedDate = h.created_at;
                    if (formattedDate && formattedDate.includes(' ')) {
                        const dateParts = formattedDate.split(' ');
                        formattedDate = `<span style="font-size:11px;">${dateParts[0]}<br>${dateParts[1]}</span>`;
                    }
                    
                    html += '<tr style="border-bottom:1px solid #eee;">';
                    html += '<td style="padding:8px; vertical-align:top;">' + formattedDate + ' ';
                    html += '<td style="padding:8px; vertical-align:top;"><strong>' + whatChanged + '</strong> ';
                    html += '<td style="padding:8px; vertical-align:top; color:#27ae60;">' + escapeHtml(newValue) + ' ';
                    html += '<td style="padding:8px; vertical-align:top;">' + escapeHtml(h.changed_by || '—') + ' ';
                    html += ' ';
                }
                
                html += '</tbody> </div>';
                document.getElementById('history-content').innerHTML = html;
            } catch(e) {
                document.getElementById('history-content').innerHTML = '<p>Ошибка загрузки истории</p>';
            }
        }
        
        function closeHistoryModal() {
            document.getElementById('historyModal').style.display = 'none';
        }
        
        async function loadDeliveryEmployees() {
            try {
                const response = await fetch('/api/employees/');
                const employees = await response.json();
                deliveryEmployees = employees.filter(e => e.role === 'delivery' && e.is_active === true);
                
                const container = document.getElementById('deliveryEmployeesList');
                if (deliveryEmployees.length === 0) {
                    container.innerHTML = '<p>Нет активных сотрудников доставки</p>';
                    return;
                }
                
                let html = '';
                for (let i = 0; i < deliveryEmployees.length; i++) {
                    const emp = deliveryEmployees[i];
                    html += `
                        <div class="checkbox" style="margin: 10px 0;">
                            <input type="checkbox" id="delivery_${emp.employee_id}" value="${emp.employee_id}">
                            <label for="delivery_${emp.employee_id}">${escapeHtml(emp.full_name)} (${escapeHtml(emp.email)})</label>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch(e) {
                document.getElementById('deliveryEmployeesList').innerHTML = '<p>Ошибка загрузки сотрудников</p>';
            }
        }
        
        function showDeliveryModal() {
            loadDeliveryEmployees();
            document.getElementById('deliveryModal').style.display = 'block';
            document.getElementById('deliveryError').textContent = '';
        }
        
        function closeDeliveryModal() {
            document.getElementById('deliveryModal').style.display = 'none';
        }
        
        async function sendToDelivery() {
            const selectedIds = [];
            for (let i = 0; i < deliveryEmployees.length; i++) {
                const emp = deliveryEmployees[i];
                const checkbox = document.getElementById(`delivery_${emp.employee_id}`);
                if (checkbox && checkbox.checked) {
                    selectedIds.push(emp.employee_id);
                }
            }
            
            if (selectedIds.length === 0) {
                document.getElementById('deliveryError').textContent = 'Выберите хотя бы одного сотрудника';
                return;
            }
            
            try {
                const response = await fetch(`/api/orders/${order_id}/send-to-delivery`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ delivery_employee_ids: selectedIds })
                });
                const result = await response.json();
                if (response.ok) {
                    alert(`✅ ${result.message}`);
                    closeDeliveryModal();
                } else {
                    document.getElementById('deliveryError').textContent = result.detail || 'Ошибка отправки';
                }
            } catch(e) {
                document.getElementById('deliveryError').textContent = 'Ошибка подключения к серверу';
            }
        }
        
        async function loadOrder() {
            try {
                const response = await fetch(`/api/orders/${order_id}`);
                if (!response.ok) {
                    throw new Error('Заказ не найден');
                }
                orderData = await response.json();
                
                let itemsHtml = '<h3>Товары в заказе</h3>';
                if (orderData.items && orderData.items.length > 0) {
                    itemsHtml += '<div class="table-container">';
                    itemsHtml += '<table class="items-table">';
                    itemsHtml += '<thead>';
                    itemsHtml += '<tr style="background:#f5f5f5;">';
                    itemsHtml += '<th style="padding:12px;">ID товара</th>';
                    itemsHtml += '<th style="padding:12px;">Наименование</th>';
                    itemsHtml += '<th style="padding:12px;">Кол-во</th>';
                    itemsHtml += '<th style="padding:12px;">Цена</th>';
                    itemsHtml += '<th style="padding:12px;">Сумма</th>';
                    itemsHtml += ' </thead><tbody>';
                    
                    for (let i = 0; i < orderData.items.length; i++) {
                        const item = orderData.items[i];
                        const itemTotal = item.price * item.quantity;
                        const rowStyle = i % 2 === 0 ? 'background:#ffffff;' : 'background:#f9f9f9;';
                        itemsHtml += '<tr style="border-bottom:1px solid #eee; ' + rowStyle + '">';
                        itemsHtml += '<td style="padding:12px;">' + (item.product_id || '—') + ' ';
                        itemsHtml += '<td style="padding:12px;"><strong>' + escapeHtml(item.product_name || '—') + '</strong> ';
                        itemsHtml += '<td style="padding:12px;">' + (item.quantity || 0) + ' шт ';
                        itemsHtml += '<td style="padding:12px;">' + (item.price ? item.price.toLocaleString() : '0') + ' ₽ ';
                        itemsHtml += '<td style="padding:12px; font-weight:bold;">' + itemTotal.toLocaleString() + ' ₽ ';
                        itemsHtml += ' ';
                    }
                    itemsHtml += '</tbody> </div>';
                } else {
                    itemsHtml += '<p>Нет товаров в заказе</p>';
                }
                
                const addressText = orderData.customer_address || '—';
                const deliveryMethod = orderData.delivery_method || 'Курьер';
                const isNotPaid = orderData.status === 'not_paid';
                const isPaid = orderData.status === 'paid';
                const isDelivered = orderData.status === 'delivered';
                
                let actionButtons = '';
                if (isNotPaid) {
                    actionButtons = `
                        <button class="edit-order-btn" onclick="editOrder()">✏️ Редактировать заказ</button>
                        <button class="send-info-btn" onclick="sendInfoToCustomer()">📧 Отправить инфо клиенту</button>
                        ${getMessengerButtons()}
                    `;
                } else if (isPaid) {
                    actionButtons = `
                        <button class="send-info-btn" onclick="sendInfoToCustomer()">📧 Отправить инфо клиенту</button>
                        <button class="edit-order-btn" onclick="showDeliveryModal()" style="background:#f39c12;">🚚 Отправить в доставку</button>
                        ${getMessengerButtons()}
                    `;
                } else if (isDelivered) {
                    actionButtons = `
                        <button class="send-info-btn" onclick="sendInfoToCustomer()">📧 Отправить инфо клиенту</button>
                        ${getMessengerButtons()}
                    `;
                }
                
                const html = `
                    <div class="detail-card">
                        <h2>📦 Заказ #${orderData.order_id}</h2>
                        <p><strong>👤 Клиент:</strong> ${escapeHtml(orderData.customer_name)}</p>
                        <p><strong>📞 Телефон:</strong> ${escapeHtml(orderData.customer_phone || '—')}</p>
                        <p><strong>📧 Email:</strong> ${escapeHtml(orderData.customer_email || '—')}</p>
                        <p><strong>📍 Адрес:</strong> ${escapeHtml(addressText)}</p>
                        <p><strong>🚚 Доставка:</strong> ${escapeHtml(deliveryMethod)}</p>
                        <p><strong>📝 Комментарий:</strong></p>
                        <div class="comment-edit">
                            <textarea id="comment_textarea" rows="3">${escapeHtml(orderData.comment || '')}</textarea>
                            <button class="save-comment-btn" onclick="saveComment()">💾 Сохранить</button>
                        </div>
                        <p><strong>💰 Сумма:</strong> ${orderData.total_amount.toLocaleString()} ₽</p>
                        <p><strong>📅 Дата:</strong> ${orderData.created_at}</p>
                        <p><strong>📊 Статус:</strong> ${getStatusBadge(orderData.status)}</p>
                        <p><strong>👤 Оформил:</strong> ${escapeHtml(orderData.created_by_name || '—')}</p>
                        <div style="margin-top: 15px;">
                            ${actionButtons}
                            <button class="history-btn" onclick="showStatusHistory()">📜 История изменений</button>
                        </div>
                    </div>
                    ${itemsHtml}
                `;
                
                document.getElementById('order-detail').innerHTML = html;
            } catch(e) {
                document.getElementById('order-detail').innerHTML = '<p>❌ Ошибка загрузки заказа: ' + e.message + '</p>';
            }
        }
        
        function editOrder() {
            window.location.href = `/orders/${order_id}/edit`;
        }
        
        async function logout() {
            const token = localStorage.getItem('token');
            if (token) {
                await fetch(`/api/auth/logout?token=${token}`, { method: 'POST' });
            }
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        loadOrder();
    </script>
</body>
</html>
